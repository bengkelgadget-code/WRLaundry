<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Waroenk Laundry Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 font-sans antialiased bg-slate-50 overflow-hidden">
<div id="app-root" class="h-screen w-full flex overflow-hidden">
    
    <div id="loading" class="fixed inset-0 bg-white/95 backdrop-blur-sm z-[110] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-6 shadow-xl animate-bounce overflow-hidden">
            <i class="ph-bold ph-washing-machine text-3xl text-white"></i>
        </div>
        <p class="text-slate-500 font-bold tracking-widest uppercase text-[10px] text-center px-6">Menyiapkan Workspace...</p>
    </div>

    <div id="toast" style="z-index: 99999;" class="fixed top-5 right-5 transform translate-x-[150%] transition-transform duration-300 flex items-center bg-slate-900 shadow-2xl rounded-2xl p-4 max-w-sm">
        <i id="toast-icon" class="ph-fill ph-check-circle text-emerald-400 text-2xl mr-3"></i>
        <span id="toast-msg" class="font-semibold text-white text-sm"></span>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-slate-100/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="bg-white/90 backdrop-blur-xl border border-slate-200/50 rounded-[2rem] shadow-xl w-full max-w-md overflow-hidden flex flex-col fade-in">
            <div class="p-10 pb-6 flex flex-col items-center">
                <div class="w-16 h-16 bg-slate-900 rounded-[1rem] flex items-center justify-center mb-6 shadow-lg overflow-hidden" id="ui-login-logo"><i class="ph-bold ph-washing-machine text-3xl text-white"></i></div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight mb-1 text-center" id="ui-login-title">Waroenk Laundry</h2>
                <p class="text-[11px] text-slate-400 font-bold tracking-widest uppercase">System Authorization</p>
            </div>
            <div class="p-10 pt-4">
                <form id="form-login" onsubmit="handleLogin(event)">
                    <div class="mb-5 group">
                        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Username</label>
                        <input type="text" id="login-username" required class="w-full px-4 py-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:border-teal-400 focus:ring-4 focus:ring-teal-50 outline-none transition-all font-semibold text-sm">
                    </div>
                    <div class="mb-8 group">
                        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Password</label>
                        <input type="password" id="login-password" required class="w-full px-4 py-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:border-teal-400 focus:ring-4 focus:ring-teal-50 outline-none transition-all font-semibold text-sm">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-teal-400 to-teal-500 text-white font-bold tracking-wide py-4 rounded-xl shadow-lg shadow-teal-500/30 active:scale-[0.98] transition-all">MASUK</button>
                </form>
            </div>
        </div>
    </div>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[50] hidden opacity-0 transition-opacity duration-300" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="bg-white w-[260px] h-full shadow-[4px_0_24px_rgba(0,0,0,0.08)] flex flex-col transition-transform duration-300 ease-in-out transform -translate-x-full md:translate-x-0 absolute md:relative z-[60] shrink-0">
        <div class="h-20 py-3 flex items-center px-4 border-b border-slate-100 shrink-0 gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg overflow-hidden shrink-0" id="ui-sidebar-logo"><i class="ph-bold ph-washing-machine text-xl text-white"></i></div>
            <span class="font-black text-slate-800 tracking-tight leading-tight uppercase text-lg truncate" id="ui-sidebar-title">Waroenk Laundry</span>
        </div>
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1" id="sidebar-menu-container"></div>
        <div class="p-4 border-t border-slate-100 bg-slate-50/50 shrink-0">
            <div class="flex items-center px-3 py-2 rounded-2xl bg-white shadow-sm border border-slate-100 cursor-pointer hover:bg-slate-50" onclick="logout()">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-white font-black mr-3 uppercase" id="user-profile-avatar">A</div>
                <div class="flex-1 overflow-hidden"><p class="text-sm font-bold text-slate-700 truncate" id="user-profile-name">Admin Utama</p><p class="text-[10px] font-black text-slate-500 tracking-wider" id="user-profile-role">ROLE: ADMIN</p></div>
                <i class="ph-bold ph-sign-out text-slate-400"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden w-full relative bg-slate-50">
        <header id="main-header" class="h-16 bg-white/80 backdrop-blur-md flex items-center justify-between px-6 z-10 border-b border-slate-200/50 shrink-0">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="md:hidden text-slate-600 mr-3 p-2 bg-slate-100 rounded-xl active:scale-95"><i class="ph-bold ph-list text-xl"></i></button>
                <h1 id="page-title" class="text-xl font-black text-slate-800 tracking-tight">Dashboard</h1>
            </div>
            <button onclick="fetchInitialData()" class="text-slate-500 hover:text-slate-800 p-2.5 bg-slate-100 rounded-xl active:scale-95 transition-all"><i class="ph-bold ph-arrows-clockwise text-xl"></i></button>
        </header>

        <div id="admin-scroll-area" class="flex-1 overflow-hidden bg-slate-50 w-full relative flex flex-col min-h-0">
            <div id="view-dashboard" class="view-section hidden fade-in p-6 w-full overflow-y-auto"></div>
            <div id="view-produksi" class="view-section hidden fade-in p-6 w-full"></div>
            <div id="dynamic-view-container" style="display: contents;"></div>
        </div>

        <div id="view-staff" class="view-section hidden fade-in flex-1 flex-col w-full bg-slate-50 overflow-hidden relative">
            <div class="px-4 py-3 bg-white border-b border-slate-100 flex justify-center items-center z-20 shrink-0 shadow-sm w-full">
                <div class="w-full max-w-3xl flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white shrink-0" id="ui-staff-logo"><i class="ph-bold ph-washing-machine"></i></div>
                        <h1 class="font-black text-slate-800 text-lg truncate" id="ui-staff-title">Waroenk Laundry POS</h1>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="btn-back-admin" onclick="switchView('dashboard')" class="hidden w-9 h-9 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center active:scale-95"><i class="ph-bold ph-squares-four text-lg"></i></button>
                        <button id="btn-printer-status" onclick="connectPrinterManually()" title="Hubungkan Printer Bluetooth" class="w-9 h-9 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center active:scale-95 transition-all"><i class="ph-bold ph-printer text-lg"></i></button>
                        <button onclick="logout()" title="Logout" class="w-9 h-9 bg-red-50 text-red-600 rounded-xl flex items-center justify-center active:scale-95"><i class="ph-bold ph-power text-lg"></i></button>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto w-full flex flex-col items-center">
                <div class="w-full max-w-3xl px-4 pt-5 pb-24">
                    <div class="grid grid-cols-1 gap-3 w-full mb-4">
                        <div class="slide-up-fade bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-5 shadow-lg text-white relative overflow-hidden">
                            <div class="absolute right-0 top-0 opacity-10"><i class="ph-fill ph-washing-machine text-8xl -mt-4 -mr-4"></i></div>
                            <p class="text-[11px] font-black uppercase tracking-widest text-slate-300 mb-1">Total Transaksi Hari Ini</p>
                            <h2 class="text-4xl font-black tracking-tighter" id="staff-total-cucian">0</h2>
                        </div>
                    </div>
                    
                    <div class="slide-up-fade flex gap-2 w-full items-center mb-4">
                        <div class="flex items-center gap-2 shrink-0 bg-white border border-slate-200 rounded-2xl p-1.5 shadow-sm h-[46px]">
                            <label class="relative inline-flex items-center cursor-pointer ml-1.5">
                                <input type="checkbox" id="staff-filter-date-toggle" class="sr-only peer" onchange="window.toggleDateFilter(this.checked)">
                                <div class="w-[36px] h-5 bg-rose-500 rounded-full peer peer-checked:bg-emerald-500 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                            </label>
                            <div class="w-px h-6 bg-slate-100"></div>
                            <div id="staff-filter-date-wrapper" class="relative w-[34px] h-[34px] opacity-40 pointer-events-none grayscale transition-all">
                                <input type="date" id="staff-filter-date" onchange="renderStaffTable()" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" disabled>
                                <div id="staff-filter-date-btn" class="w-full h-full bg-slate-50 rounded-xl flex items-center justify-center text-slate-500"><i class="ph-bold ph-calendar-blank text-[22px]"></i><span id="staff-filter-date-text" class="absolute inset-0 flex items-center justify-center text-[10px] font-black pt-1.5"></span></div>
                            </div>
                        </div>
                        <div class="relative flex-1 h-[46px]"><i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" id="staff-search" oninput="renderStaffTable()" placeholder="Cari..." class="w-full h-full pl-9 pr-3 py-2 text-[13px] font-bold border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-teal-300 transition-all"></div>
                        <select id="staff-filter-status" onchange="renderStaffTable()" class="w-[100px] h-[46px] px-2 py-2 text-[13px] font-bold border border-slate-200 rounded-2xl shadow-sm outline-none"><option value="">Semua</option><option value="Proses">Proses</option><option value="Selesai">Selesai</option><option value="Diambil">Diambil</option></select>
                    </div>
                    
                    <div class="space-y-3 w-full" id="staff-transaction-list"></div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200/50 py-3 px-4 shadow-xl z-30 flex justify-center transition-transform">
                <div class="w-full max-w-3xl">
                    <button onclick="openStaffModal()" class="w-full bg-gradient-to-r from-teal-400 to-teal-500 text-white font-black py-3 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center text-sm"><i class="ph-bold ph-plus-circle text-lg mr-2"></i> TAMBAH TRANSAKSI</button>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-staff-tx" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] hidden flex-col modal-enter overflow-hidden w-full h-full items-center">
        <div class="px-5 py-4 border-b border-slate-100 flex justify-center bg-white z-20 shadow-sm shrink-0 w-full">
            <div class="w-full max-w-3xl flex justify-between items-center">
                <h3 class="text-lg font-black text-slate-800">Transaksi Baru</h3>
                <button type="button" onclick="closeModal('modal-staff-tx')" class="w-8 h-8 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors"><i class="ph-bold ph-x"></i></button>
            </div>
        </div>
        <div class="overflow-y-auto flex-1 w-full bg-slate-50 flex flex-col items-center scroll-smooth p-4 sm:p-6" id="staff-modal-scroll-area">
            <div class="w-full max-w-3xl pb-28"><form id="form-staff-tx" class="space-y-4"></form></div>
        </div>
        <div id="staff-footer-action" class="absolute bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200/50 py-4 px-4 shadow-2xl z-30 hidden justify-center">
            <div class="w-full max-w-3xl flex items-center justify-between">
                <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest" id="staff-total-biaya-label">Total Biaya</span><span class="text-xl font-black text-slate-800" id="staff-total-biaya">Rp 0</span></div>
                <button type="button" onclick="submitStaffTransaction()" id="btn-submit-staff" class="px-8 bg-gradient-to-r from-teal-400 to-teal-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="dynamic-modal-container"></div>
    <div id="modal-tx-detail" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4"></div>
    <div id="modal-history-pelanggan" style="z-index: 9998;" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4"></div>
    <div id="modal-confirm-zett" style="z-index: 10000;" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center p-4"></div>
    <div id="modal-success-print" style="z-index: 9999;" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center p-4"></div>
    <div id="print-area" class="no-print"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<script src="script-core.js"></script>
<script src="script-admin.js"></script>
<script src="script-pos.js"></script>
</body>
</html>
